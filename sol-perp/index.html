<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eToro — spot vs perpetual (Binance, 1m)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #d8f0dc;
      --bg-panel: #ecf8ee;
      --border: #9ccc9e;
      --text: #1b4332;
      --muted: #2d6a4f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1.25rem 1rem 2.5rem;
      max-width: 960px;
      margin-inline: auto;
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .brand {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem 1.5rem;
      margin-bottom: 1rem;
      padding: 1rem 1.25rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .brand img.logo {
      height: 40px;
      width: auto;
      display: block;
    }
    .brand .tagline {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 36rem;
      line-height: 1.4;
    }
    h1.page-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      color: var(--text);
    }
    p.global-meta {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.45;
      margin: 0 0 1.25rem;
    }
    .err {
      background: #ffebee;
      color: #b71c1c;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      border: 1px solid #ef9a9a;
    }
    .asset-block {
      margin-bottom: 1.75rem;
      padding: 1rem 1.1rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .asset-block h2 {
      margin: 0 0 0.35rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: #14532d;
      letter-spacing: 0.02em;
    }
    p.asset-meta {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
      margin: 0 0 0.65rem;
    }
    .chart-box {
      position: relative;
      height: 240px;
      width: 100%;
    }
    code {
      font-size: 0.85em;
      background: rgba(255, 255, 255, 0.7);
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <header class="brand">
    <img class="logo" src="etoro-logo.svg" width="200" height="44" alt="eToro" />
    <p class="tagline">
      Spot vs Binance USDⓈ-M perpetual (1m closes, 2 days). Funding and overnight bps are illustrative;
      not official eToro pricing.
    </p>
  </header>

  <h1 class="page-title">BTC · ETH · XRP · ADA · SOL</h1>
  <p class="global-meta" id="globalMeta">Loading <code>data.json</code>…</p>
  <div id="err" class="err" style="display:none"></div>
  <div id="chartsRoot"></div>

  <script>
    const DISPLAY_ORDER = ["BTC", "ETH", "XRP", "ADA", "SOL"];

    /* Strong contrast on light green panels */
    const PERP_COLOR = "#b45309";
    const SPOT_COLOR = "#0369a1";
    const FUND_COLOR = "#6d28d9";
    const AXIS = "#37474f";
    const GRID = "#b0bec5";
    const LEGEND = "#263238";
    const TITLE_GREEN = "#1b5e20";

    function pctFunding(rate) {
      if (rate == null || Number.isNaN(rate)) return "—";
      return (Number(rate) * 100).toFixed(4) + "% / 8h";
    }

    function normalizeAssets(data) {
      if (Array.isArray(data.assets) && data.assets.length > 0) return data.assets;
      const s = data.series || [];
      if (!s.length) return [];
      const idGuess =
        (data.symbol_spot && data.symbol_spot.split("/")[0]) ||
        (data.symbol_perp && data.symbol_perp.split("/")[0]) ||
        "SOL";
      return [
        {
          id: idGuess,
          symbol_perp: data.symbol_perp,
          symbol_spot: data.symbol_spot,
          series: s,
          latest_funding_rate: data.latest_funding_rate,
          latest_funding_time: data.latest_funding_time,
          avg_funding_rate_8h: data.avg_funding_rate_8h,
          etoro_overnight_fee_bps_approx: data.etoro_overnight_fee_bps_approx,
        },
      ];
    }

    function orderAssets(assets) {
      const byId = Object.fromEntries(assets.map((a) => [a.id, a]));
      const out = [];
      DISPLAY_ORDER.forEach((id) => {
        if (byId[id]) out.push(byId[id]);
      });
      assets.forEach((a) => {
        if (!DISPLAY_ORDER.includes(a.id)) out.push(a);
      });
      return out;
    }

    function rowPerp(r) {
      if (r.perp != null) return r.perp;
      if (r.binance != null) return r.binance;
      return null;
    }

    function rowSpot(r) {
      return r.spot != null ? r.spot : null;
    }

    function assetMetaLines(globalData, asset) {
      const symP = asset.symbol_perp || "";
      const symS = asset.symbol_spot || "";
      const latestFr = asset.latest_funding_rate;
      const latestFt = asset.latest_funding_time || "";
      const bps = asset.etoro_overnight_fee_bps_approx;
      const n = (asset.series || []).length;
      const parts = [
        (symS && symP ? symS + " · " + symP : symP) +
          " · " +
          n +
          " bars",
        "Latest funding: " +
          pctFunding(latestFr) +
          (latestFt ? " (" + latestFt + ")" : ""),
      ];
      if (bps != null && !Number.isNaN(Number(bps))) {
        parts.push(
          "Overnight (illustrative): ~" + Number(bps).toFixed(2) + " bps/day"
        );
      }
      return parts.join(" · ");
    }

    function buildChart(canvas, globalData, asset) {
      const series = asset.series || [];
      const tf = globalData.timeframe || "";
      const labels = series.map((r) => {
        const d = new Date(r.ts);
        if (tf === "1m") {
          return d.toISOString().slice(5, 16).replace("T", " ");
        }
        return d.toISOString().slice(0, 16).replace("T", " ");
      });

      const hasFunding = series.some((r) => r.funding_rate != null);

      const datasets = [
        {
          label: "Perpetual (1m)",
          data: series.map(rowPerp),
          borderColor: PERP_COLOR,
          backgroundColor: "transparent",
          tension: 0.15,
          pointRadius: 0,
          borderWidth: 2,
          yAxisID: "y",
        },
        {
          label: "Spot (1m)",
          data: series.map(rowSpot),
          borderColor: SPOT_COLOR,
          backgroundColor: "transparent",
          tension: 0.15,
          pointRadius: 0,
          borderWidth: 2,
          yAxisID: "y",
        },
      ];

      if (hasFunding) {
        datasets.push({
          label: "Funding % / 8h",
          data: series.map((r) =>
            r.funding_rate != null ? Number(r.funding_rate) * 100 : null
          ),
          borderColor: FUND_COLOR,
          backgroundColor: "transparent",
          stepped: "before",
          pointRadius: 0,
          borderWidth: 1.5,
          yAxisID: "y1",
        });
      }

      const scales = {
        x: {
          ticks: {
            color: AXIS,
            maxRotation: 45,
            autoSkip: true,
            maxTicksLimit: tf === "1m" ? 14 : 12,
            font: { size: 10 },
          },
          grid: { color: GRID },
        },
        y: {
          ticks: { color: AXIS, font: { size: 10 } },
          grid: { color: GRID },
          title: {
            display: true,
            text: "USDT",
            color: AXIS,
            font: { size: 11 },
          },
        },
      };

      if (hasFunding) {
        scales.y1 = {
          position: "right",
          ticks: { color: FUND_COLOR, font: { size: 10 } },
          grid: { drawOnChartArea: false },
          title: {
            display: true,
            text: "Funding %",
            color: FUND_COLOR,
            font: { size: 11 },
          },
        };
      }

      const fundingDsIndex = hasFunding ? 2 : -1;
      const bpsApprox = asset.etoro_overnight_fee_bps_approx;
      const showTitle =
        bpsApprox != null && !Number.isNaN(Number(bpsApprox));
      const chartTitleText = showTitle
        ? (asset.id || "") +
          " · ~" +
          Number(bpsApprox).toFixed(2) +
          " bps/day (illustrative)"
        : (asset.id || "") + " · spot vs perp";

      return new Chart(canvas, {
        type: "line",
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            title: {
              display: true,
              text: chartTitleText,
              color: TITLE_GREEN,
              font: { size: 12, weight: "600" },
              padding: { bottom: 6 },
            },
            legend: {
              labels: { color: LEGEND, font: { size: 11 } },
            },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const v = ctx.parsed.y;
                  if (fundingDsIndex >= 0 && ctx.datasetIndex === fundingDsIndex) {
                    return (
                      ctx.dataset.label +
                      ": " +
                      (v != null && !Number.isNaN(v) ? v.toFixed(4) + "%" : "—")
                    );
                  }
                  return (
                    ctx.dataset.label +
                    ": " +
                    (v != null && !Number.isNaN(v) ? Number(v).toFixed(4) : "—")
                  );
                },
              },
            },
          },
          scales,
        },
      });
    }

    async function load() {
      const globalMeta = document.getElementById("globalMeta");
      const errBox = document.getElementById("err");
      const root = document.getElementById("chartsRoot");
      let data;
      try {
        const res = await fetch("data.json", { cache: "no-store" });
        if (!res.ok) {
          throw new Error(
            "HTTP " + res.status + " — run: python scripts/build_sol_perp_chart_data.py"
          );
        }
        data = await res.json();
      } catch (e) {
        errBox.style.display = "block";
        errBox.textContent = String(e.message || e);
        globalMeta.textContent = "Could not load data.json";
        return;
      }

      const raw = normalizeAssets(data);
      const assets = orderAssets(raw);
      if (!assets.length) {
        errBox.style.display = "block";
        errBox.textContent = "No assets in data.json";
        globalMeta.textContent = "Empty dataset";
        return;
      }

      const tf = data.timeframe || "";
      const wd =
        data.window_days != null ? data.window_days + "d" : "";
      const note = data.etoro_overnight_fee_bps_note || "";
      globalMeta.innerHTML =
        "<code>" +
        tf +
        "</code>" +
        (wd ? " · " + wd + " window" : "") +
        " · generated <code>" +
        (data.generated_at || "?") +
        "</code>" +
        (note
          ? "<br><span style=\"font-size:0.8rem\">" + note + "</span>"
          : "");

      root.innerHTML = "";
      const charts = [];

      assets.forEach((asset) => {
        const section = document.createElement("section");
        section.className = "asset-block";

        const h2 = document.createElement("h2");
        h2.textContent = asset.id || "—";
        section.appendChild(h2);

        const p = document.createElement("p");
        p.className = "asset-meta";
        p.textContent = assetMetaLines(data, asset);
        section.appendChild(p);

        const box = document.createElement("div");
        box.className = "chart-box";
        const canvas = document.createElement("canvas");
        box.appendChild(canvas);
        section.appendChild(box);

        root.appendChild(section);
        charts.push(buildChart(canvas, data, asset));
      });

      window.addEventListener(
        "beforeunload",
        () => {
          charts.forEach((c) => c.destroy());
        },
        { once: true }
      );
    }
    load();
  </script>
</body>
</html>
