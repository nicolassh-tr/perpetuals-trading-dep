<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eToro Trading Department — spot vs perpetual (Binance, 1m)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #d8f0dc;
      --bg-panel: #ecf8ee;
      --border: #9ccc9e;
      --text: #1b4332;
      --muted: #2d6a4f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1.25rem 1rem 3.5rem;
      max-width: 960px;
      margin-inline: auto;
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .brand {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem 1.5rem;
      margin-bottom: 1rem;
      padding: 1rem 1.25rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .brand img.logo {
      height: 40px;
      width: auto;
      display: block;
    }
    .brand .tagline {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 36rem;
      line-height: 1.4;
    }
    h1.page-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      color: var(--text);
    }
    p.global-meta {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.45;
      margin: 0 0 1.25rem;
    }
    .err {
      background: #ffebee;
      color: #b71c1c;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      border: 1px solid #ef9a9a;
    }
    .asset-block {
      margin-bottom: 1.75rem;
      padding: 1rem 1.1rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .asset-block h2 {
      margin: 0 0 0.35rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: #14532d;
      letter-spacing: 0.02em;
    }
    p.asset-meta {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
      margin: 0 0 0.65rem;
    }
    .chart-box {
      position: relative;
      height: 240px;
      width: 100%;
    }
    code {
      font-size: 0.85em;
      background: rgba(255, 255, 255, 0.7);
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }
    .dir-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      margin-top: 0.75rem;
    }
    .dir-table th,
    .dir-table td {
      padding: 0.35rem 0.6rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    .dir-table th {
      text-align: left;
      font-weight: 600;
      color: var(--text);
      background: rgba(0,0,0,0.03);
    }
    .dir-table td:first-child {
      text-align: left;
      font-weight: 500;
    }
    .dir-table .section-label {
      text-align: left;
      font-weight: 700;
      color: #14532d;
      padding-top: 0.5rem;
      border-bottom: 2px solid var(--border);
      background: transparent;
    }
    .pay { color: #b91c1c; }
    .receive { color: #15803d; }
    .neutral { color: var(--muted); }
    .dir-table caption {
      caption-side: top;
      text-align: left;
      font-weight: 600;
      font-size: 0.88rem;
      color: #14532d;
      padding-bottom: 0.3rem;
    }
    .funding-chart-box {
      position: relative;
      height: 180px;
      width: 100%;
      margin-top: 0.75rem;
    }
    .refresh-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      background: #14532d;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: system-ui, sans-serif;
      z-index: 9999;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.25);
    }
    .refresh-bar button {
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 0.3rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .refresh-bar button:hover { background: #16a34a; }
  </style>
</head>
<body>
  <header class="brand">
    <div style="display:flex;align-items:baseline;gap:0.35rem">
      <img class="logo" src="etoro-logo.svg" width="200" height="44" alt="eToro" />
      <span style="font-size:1.55rem;font-weight:700;color:#6AAE22;font-family:'Segoe UI',system-ui,Arial,sans-serif">Trading Department</span>
    </div>
    <p class="tagline">
      Spot vs Binance USDⓈ-M perpetual (1m closes, 2 days). Funding costs per direction (long/short)
      and overnight bps are illustrative; not official eToro pricing.
    </p>
  </header>

  <h1 class="page-title">BTC · ETH · XRP · ADA · SOL</h1>
  <p class="global-meta" id="globalMeta">Fetching live data from Binance…</p>
  <div id="err" class="err" style="display:none"></div>
  <div id="chartsRoot"></div>
  <div class="refresh-bar" id="refreshBar">
    <span id="refreshStatus">Next refresh in 10:00</span>
    <button id="refreshNow">Refresh now</button>
  </div>

  <script>
    const DISPLAY_ORDER = ["BTC", "ETH", "XRP", "ADA", "SOL"];

    /* ── Live Binance fetch ── */
    const BINANCE_FAPI = "https://fapi.binance.com";
    const BINANCE_SPOT = "https://api.binance.com";
    const LIVE_ASSETS = [
      { id: "BTC", perp: "BTCUSDT", spot: "BTCUSDT", symPerp: "BTC/USDT:USDT", symSpot: "BTC/USDT" },
      { id: "ETH", perp: "ETHUSDT", spot: "ETHUSDT", symPerp: "ETH/USDT:USDT", symSpot: "ETH/USDT" },
      { id: "XRP", perp: "XRPUSDT", spot: "XRPUSDT", symPerp: "XRP/USDT:USDT", symSpot: "XRP/USDT" },
      { id: "ADA", perp: "ADAUSDT", spot: "ADAUSDT", symPerp: "ADA/USDT:USDT", symSpot: "ADA/USDT" },
      { id: "SOL", perp: "SOLUSDT", spot: "SOLUSDT", symPerp: "SOL/USDT:USDT", symSpot: "SOL/USDT" },
    ];
    const LIVE_WINDOW_DAYS = 2;
    const LIVE_NOTIONAL = 10000;
    const KLINE_LIMIT = 1500;

    async function fetchKlines(base, endpoint, symbol, interval, startMs, endMs) {
      const byTs = new Map();
      let cursor = startMs;
      for (let i = 0; i < 32; i++) {
        const url = base + endpoint + "?symbol=" + symbol + "&interval=" + interval +
          "&startTime=" + cursor + "&endTime=" + endMs + "&limit=" + KLINE_LIMIT;
        const res = await fetch(url);
        if (!res.ok) throw new Error(symbol + " klines HTTP " + res.status);
        const batch = await res.json();
        if (!batch.length) break;
        for (const c of batch) {
          if (c[0] >= startMs && c[0] <= endMs) byTs.set(c[0], parseFloat(c[4]));
        }
        const lastTs = batch[batch.length - 1][0];
        cursor = lastTs + 60000;
        if (lastTs >= endMs || batch.length < KLINE_LIMIT) break;
      }
      return byTs;
    }

    async function fetchFunding(symbol, startMs, endMs) {
      const out = [];
      let cursor = startMs;
      for (let i = 0; i < 10; i++) {
        const url = BINANCE_FAPI + "/fapi/v1/fundingRate?symbol=" + symbol +
          "&startTime=" + cursor + "&endTime=" + endMs + "&limit=1000";
        const res = await fetch(url);
        if (!res.ok) throw new Error(symbol + " funding HTTP " + res.status);
        const batch = await res.json();
        if (!batch.length) break;
        for (const r of batch) {
          out.push({ timestamp: r.fundingTime, fundingRate: parseFloat(r.fundingRate),
            datetime: new Date(r.fundingTime).toISOString() });
        }
        cursor = batch[batch.length - 1].fundingTime + 1;
        if (batch.length < 1000) break;
      }
      return out.sort((a, b) => a.timestamp - b.timestamp);
    }

    function forwardFill(barTs, fundingRows) {
      const events = fundingRows.map(r => [r.timestamp, r.fundingRate]).sort((a, b) => a[0] - b[0]);
      if (!events.length) return barTs.map(() => null);
      const out = [];
      let idx = 0, cur = null;
      for (const ts of barTs) {
        while (idx < events.length && events[idx][0] <= ts) { cur = events[idx][1]; idx++; }
        out.push(cur);
      }
      return out;
    }

    async function buildAssetLive(def, startMs, endMs) {
      const fundingSince = startMs - 30 * 24 * 3600000;
      const [perpMap, spotMap, fundingRaw] = await Promise.all([
        fetchKlines(BINANCE_FAPI, "/fapi/v1/klines", def.perp, "1m", startMs, endMs),
        fetchKlines(BINANCE_SPOT, "/api/v3/klines", def.spot, "1m", startMs, endMs),
        fetchFunding(def.perp, fundingSince, endMs),
      ]);

      const barTs = [...perpMap.keys()].sort((a, b) => a - b);
      const fundingPerBar = forwardFill(barTs, fundingRaw);
      const series = [];
      for (let i = 0; i < barTs.length; i++) {
        const ts = barTs[i];
        const sc = spotMap.get(ts);
        if (sc == null) continue;
        series.push({ ts, perp: perpMap.get(ts), spot: sc, funding_rate: fundingPerBar[i] });
      }

      const frSamples = series.filter(r => r.funding_rate != null).map(r => r.funding_rate);
      const avg8h = frSamples.length ? frSamples.reduce((a, b) => a + b, 0) / frSamples.length : null;
      const dailyDec = avg8h != null ? avg8h * 3 : null;
      const overnightBps = dailyDec != null ? dailyDec * 10000 : null;
      const lastFr = fundingRaw.length ? fundingRaw[fundingRaw.length - 1] : null;

      const windowFunding = fundingRaw.filter(r => r.timestamp >= startMs && r.timestamp <= endMs);
      const nSet = windowFunding.length;
      let cumL = 0, cumS = 0;
      const settlements = windowFunding.map(r => {
        const lc = r.fundingRate * LIVE_NOTIONAL, sc = -r.fundingRate * LIVE_NOTIONAL;
        cumL -= lc; cumS -= sc;
        return { ts: r.timestamp, dt: r.datetime, rate: r.fundingRate,
          long_cost: +lc.toFixed(4), short_cost: +sc.toFixed(4),
          cum_long_pnl: +cumL.toFixed(4), cum_short_pnl: +cumS.toFixed(4) };
      });

      const posRates = windowFunding.filter(r => r.fundingRate > 0);
      const pctPos = nSet ? +(posRates.length / nSet * 100).toFixed(1) : null;
      const annF = 3 * 365;
      const annL = avg8h != null ? +(avg8h * annF * 100).toFixed(2) : null;
      const annS = avg8h != null ? +(-avg8h * annF * 100).toFixed(2) : null;

      const cut24 = endMs - 86400000;
      const h24ev = windowFunding.filter(r => r.timestamp >= cut24);
      const h24sum = h24ev.reduce((a, r) => a + r.fundingRate, 0);

      return {
        id: def.id, symbol_perp: def.symPerp, symbol_spot: def.symSpot,
        count: series.length, series,
        latest_funding_rate: lastFr ? lastFr.fundingRate : null,
        latest_funding_time: lastFr ? lastFr.datetime : null,
        avg_funding_rate_8h: avg8h,
        binance_daily_funding_decimal_approx: dailyDec,
        etoro_overnight_fee_bps_approx: overnightBps,
        per_direction: {
          notional_usd: LIVE_NOTIONAL, n_settlements: nSet,
          pct_positive_funding: pctPos,
          last_24h: {
            n_settlements: h24ev.length,
            long_overnight_bps: +(h24sum * 10000).toFixed(2),
            short_overnight_bps: +(-h24sum * 10000).toFixed(2),
            settlements: h24ev.map(e => ({ dt: e.datetime, rate: e.fundingRate,
              rate_bps: +(e.fundingRate * 10000).toFixed(4) })),
          },
          long: {
            label: "Long holder",
            total_funding_cost_usd: +settlements.reduce((a, s) => a + s.long_cost, 0).toFixed(4),
            cumulative_funding_pnl_usd: +cumL.toFixed(4),
            avg_daily_cost_bps: avg8h != null ? +(avg8h * 3 * 10000).toFixed(2) : null,
            annualized_cost_pct: annL,
          },
          short: {
            label: "Short holder",
            total_funding_cost_usd: +settlements.reduce((a, s) => a + s.short_cost, 0).toFixed(4),
            cumulative_funding_pnl_usd: +cumS.toFixed(4),
            avg_daily_cost_bps: avg8h != null ? +(-avg8h * 3 * 10000).toFixed(2) : null,
            annualized_cost_pct: annS,
          },
          settlements,
        },
      };
    }

    async function fetchLiveData(statusEl) {
      const endMs = Date.now();
      const startMs = endMs - LIVE_WINDOW_DAYS * 86400000;
      const assets = [];
      for (let i = 0; i < LIVE_ASSETS.length; i += 2) {
        const batch = LIVE_ASSETS.slice(i, i + 2);
        if (statusEl) statusEl.textContent = "Fetching " + batch.map(b => b.id).join(", ") + "…";
        const results = await Promise.all(batch.map(d => buildAssetLive(d, startMs, endMs)));
        assets.push(...results);
      }
      return {
        generated_at: new Date().toISOString().replace(/\.\d{3}Z$/, "Z"),
        timeframe: "1m", window_days: LIVE_WINDOW_DAYS,
        venues: { perp: "binance_usdm", spot: "binance" },
        source: "live",
        etoro_overnight_fee_bps_note: "Illustrative only: mean Binance 8h funding × 3, as bps/day — not eToro pricing.",
        assets,
      };
    }

    /* Strong contrast on light green panels */
    const PERP_COLOR = "#b45309";
    const SPOT_COLOR = "#0369a1";
    const FUND_COLOR = "#6d28d9";
    const AXIS = "#37474f";
    const GRID = "#b0bec5";
    const LEGEND = "#263238";
    const TITLE_GREEN = "#1b5e20";

    function pctFunding(rate) {
      if (rate == null || Number.isNaN(rate)) return "—";
      return (Number(rate) * 100).toFixed(4) + "% / 8h";
    }

    function normalizeAssets(data) {
      if (Array.isArray(data.assets) && data.assets.length > 0) return data.assets;
      const s = data.series || [];
      if (!s.length) return [];
      const idGuess =
        (data.symbol_spot && data.symbol_spot.split("/")[0]) ||
        (data.symbol_perp && data.symbol_perp.split("/")[0]) ||
        "SOL";
      return [
        {
          id: idGuess,
          symbol_perp: data.symbol_perp,
          symbol_spot: data.symbol_spot,
          series: s,
          latest_funding_rate: data.latest_funding_rate,
          latest_funding_time: data.latest_funding_time,
          avg_funding_rate_8h: data.avg_funding_rate_8h,
          etoro_overnight_fee_bps_approx: data.etoro_overnight_fee_bps_approx,
        },
      ];
    }

    function orderAssets(assets) {
      const byId = Object.fromEntries(assets.map((a) => [a.id, a]));
      const out = [];
      DISPLAY_ORDER.forEach((id) => {
        if (byId[id]) out.push(byId[id]);
      });
      assets.forEach((a) => {
        if (!DISPLAY_ORDER.includes(a.id)) out.push(a);
      });
      return out;
    }

    function rowPerp(r) {
      if (r.perp != null) return r.perp;
      if (r.binance != null) return r.binance;
      return null;
    }

    function rowSpot(r) {
      return r.spot != null ? r.spot : null;
    }

    function assetMetaLines(globalData, asset) {
      const symP = asset.symbol_perp || "";
      const symS = asset.symbol_spot || "";
      const latestFr = asset.latest_funding_rate;
      const latestFt = asset.latest_funding_time || "";
      const n = (asset.series || []).length;
      const parts = [
        (symS && symP ? symS + " · " + symP : symP) +
          " · " +
          n +
          " bars",
        "Latest funding: " +
          pctFunding(latestFr) +
          (latestFt ? " (" + latestFt + ")" : ""),
      ];
      return parts.join(" · ");
    }

    function fmtUsd(v) {
      if (v == null || Number.isNaN(v)) return "—";
      const sign = v >= 0 ? "+" : "";
      return sign + "$" + v.toFixed(2);
    }
    function fmtBps(v) {
      if (v == null || Number.isNaN(v)) return "—";
      return v.toFixed(2) + " bps/day";
    }
    function fmtPct(v) {
      if (v == null || Number.isNaN(v)) return "—";
      return v.toFixed(2) + "%";
    }
    function costClass(v) {
      if (v == null || Number.isNaN(v)) return "neutral";
      return v > 0 ? "pay" : v < 0 ? "receive" : "neutral";
    }
    function payRecv(v) {
      if (v == null || Number.isNaN(v)) return "—";
      if (v > 0) return "Pay $" + v.toFixed(2);
      if (v < 0) return "Receive $" + Math.abs(v).toFixed(2);
      return "$0.00";
    }

    function buildDirectionTable(asset) {
      const pd = asset.per_direction;
      if (!pd) return null;
      const l = pd.long || {};
      const s = pd.short || {};
      const notional = pd.notional_usd || 10000;
      const nSet = pd.n_settlements || 0;
      const pctPos = pd.pct_positive_funding;
      const h24 = pd.last_24h || {};

      const table = document.createElement("table");
      table.className = "dir-table";

      const caption = document.createElement("caption");
      caption.textContent = "Funding per direction (" + nSet + " settlements, $" + notional.toLocaleString() + " notional)";
      table.appendChild(caption);

      const thead = document.createElement("thead");
      thead.innerHTML = "<tr><th></th><th>Long</th><th>Short</th></tr>";
      table.appendChild(thead);

      const tbody = document.createElement("tbody");

      // Last 24h overnight fee — the key row
      if (h24.long_overnight_bps != null) {
        const secRow24 = document.createElement("tr");
        secRow24.innerHTML = '<td class="section-label" colspan="3">Last 24h Overnight Fee (' + (h24.n_settlements || 0) + ' settlements)</td>';
        tbody.appendChild(secRow24);

        const r24 = document.createElement("tr");
        r24.innerHTML =
          "<td><strong>Overnight fee (24h)</strong></td>" +
          '<td class="' + costClass(h24.long_overnight_bps) + '"><strong>' + fmtBps(h24.long_overnight_bps) + "</strong></td>" +
          '<td class="' + costClass(h24.short_overnight_bps) + '"><strong>' + fmtBps(h24.short_overnight_bps) + "</strong></td>";
        tbody.appendChild(r24);

        // Per-settlement breakdown
        (h24.settlements || []).forEach(function (st) {
          const tr = document.createElement("tr");
          const dt = st.dt ? st.dt.slice(5, 16).replace("T", " ") : "—";
          const bpsVal = st.rate_bps;
          tr.innerHTML =
            '<td style="padding-left:1.2rem;font-size:0.78rem;color:var(--muted)">' + dt + "</td>" +
            '<td class="' + costClass(bpsVal) + '" style="font-size:0.78rem">' + (bpsVal != null ? bpsVal.toFixed(2) + " bps" : "—") + "</td>" +
            '<td class="' + costClass(bpsVal != null ? -bpsVal : null) + '" style="font-size:0.78rem">' + (bpsVal != null ? (-bpsVal).toFixed(2) + " bps" : "—") + "</td>";
          tbody.appendChild(tr);
        });

        // Annualized from last 24h
        const ann24Long = h24.long_overnight_bps / 10000 * 365 * 100;
        const ann24Short = h24.short_overnight_bps / 10000 * 365 * 100;
        const annRow = document.createElement("tr");
        annRow.innerHTML =
          "<td>Annualized (last 24h)</td>" +
          '<td class="' + costClass(ann24Long) + '">' + fmtPct(ann24Long) + "</td>" +
          '<td class="' + costClass(ann24Short) + '">' + fmtPct(ann24Short) + "</td>";
        tbody.appendChild(annRow);
      }

      // 2-day window section
      const secRow = document.createElement("tr");
      secRow.innerHTML = '<td class="section-label" colspan="3">2-Day Window Average</td>';
      tbody.appendChild(secRow);

      const rows = [
        ["Avg daily cost", fmtBps(l.avg_daily_cost_bps), fmtBps(s.avg_daily_cost_bps), l.avg_daily_cost_bps, s.avg_daily_cost_bps, false],
        ["Annualized cost", fmtPct(l.annualized_cost_pct), fmtPct(s.annualized_cost_pct), l.annualized_cost_pct, s.annualized_cost_pct, false],
        ["Total window cost", payRecv(l.total_funding_cost_usd), payRecv(s.total_funding_cost_usd), l.total_funding_cost_usd, s.total_funding_cost_usd, false],
        ["Cumulative PnL", fmtUsd(l.cumulative_funding_pnl_usd), fmtUsd(s.cumulative_funding_pnl_usd), l.cumulative_funding_pnl_usd, s.cumulative_funding_pnl_usd, true],
      ];
      rows.forEach(([label, lVal, sVal, lNum, sNum, isPnl]) => {
        const lClass = isPnl ? costClass(-(lNum || 0)) : costClass(lNum);
        const sClass = isPnl ? costClass(-(sNum || 0)) : costClass(sNum);
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" + label + "</td>" +
          '<td class="' + lClass + '">' + lVal + "</td>" +
          '<td class="' + sClass + '">' + sVal + "</td>";
        tbody.appendChild(tr);
      });

      if (pctPos != null) {
        const pctRow = document.createElement("tr");
        pctRow.innerHTML =
          "<td>Settlements with positive rate</td>" +
          '<td class="neutral" colspan="2">' + pctPos.toFixed(1) + "% (" + nSet + " total)</td>";
        tbody.appendChild(pctRow);
      }

      table.appendChild(tbody);
      return table;
    }

    function buildFundingPnlChart(canvas, asset) {
      const pd = asset.per_direction;
      if (!pd || !pd.settlements || !pd.settlements.length) return null;
      const settlements = pd.settlements;
      const labels = settlements.map((s) => {
        const d = new Date(s.ts);
        return d.toISOString().slice(5, 16).replace("T", " ");
      });
      return new Chart(canvas, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "Long cum. PnL ($)",
              data: settlements.map((s) => s.cum_long_pnl),
              borderColor: "#0369a1",
              backgroundColor: "transparent",
              tension: 0.2,
              pointRadius: 2,
              borderWidth: 2,
            },
            {
              label: "Short cum. PnL ($)",
              data: settlements.map((s) => s.cum_short_pnl),
              borderColor: "#b45309",
              backgroundColor: "transparent",
              tension: 0.2,
              pointRadius: 2,
              borderWidth: 2,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            title: {
              display: true,
              text: (asset.id || "") + " — cumulative funding PnL ($" + ((pd.notional_usd || 10000)/1000) + "k notional)",
              color: TITLE_GREEN,
              font: { size: 11, weight: "600" },
            },
            legend: { labels: { color: LEGEND, font: { size: 10 } } },
            tooltip: {
              callbacks: {
                label: (ctx) => ctx.dataset.label + ": $" + (ctx.parsed.y != null ? ctx.parsed.y.toFixed(2) : "—"),
              },
            },
          },
          scales: {
            x: {
              ticks: { color: AXIS, maxRotation: 45, autoSkip: true, maxTicksLimit: 10, font: { size: 9 } },
              grid: { color: GRID },
            },
            y: {
              ticks: { color: AXIS, font: { size: 10 } },
              grid: { color: GRID },
              title: { display: true, text: "USD", color: AXIS, font: { size: 10 } },
            },
          },
        },
      });
    }

    function buildChart(canvas, globalData, asset) {
      const series = asset.series || [];
      const tf = globalData.timeframe || "";
      const labels = series.map((r) => {
        const d = new Date(r.ts);
        if (tf === "1m") {
          return d.toISOString().slice(5, 16).replace("T", " ");
        }
        return d.toISOString().slice(0, 16).replace("T", " ");
      });

      const hasFunding = series.some((r) => r.funding_rate != null);

      const datasets = [
        {
          label: "Perpetual (1m)",
          data: series.map(rowPerp),
          borderColor: PERP_COLOR,
          backgroundColor: "transparent",
          tension: 0.15,
          pointRadius: 0,
          borderWidth: 2,
          yAxisID: "y",
        },
        {
          label: "Spot (1m)",
          data: series.map(rowSpot),
          borderColor: SPOT_COLOR,
          backgroundColor: "transparent",
          tension: 0.15,
          pointRadius: 0,
          borderWidth: 2,
          yAxisID: "y",
        },
      ];

      if (hasFunding) {
        datasets.push({
          label: "Funding % / 8h",
          data: series.map((r) =>
            r.funding_rate != null ? Number(r.funding_rate) * 100 : null
          ),
          borderColor: FUND_COLOR,
          backgroundColor: "transparent",
          stepped: "before",
          pointRadius: 0,
          borderWidth: 1.5,
          yAxisID: "y1",
        });
      }

      const scales = {
        x: {
          ticks: {
            color: AXIS,
            maxRotation: 45,
            autoSkip: true,
            maxTicksLimit: tf === "1m" ? 14 : 12,
            font: { size: 10 },
          },
          grid: { color: GRID },
        },
        y: {
          ticks: { color: AXIS, font: { size: 10 } },
          grid: { color: GRID },
          title: {
            display: true,
            text: "USDT",
            color: AXIS,
            font: { size: 11 },
          },
        },
      };

      if (hasFunding) {
        scales.y1 = {
          position: "right",
          ticks: { color: FUND_COLOR, font: { size: 10 } },
          grid: { drawOnChartArea: false },
          title: {
            display: true,
            text: "Funding %",
            color: FUND_COLOR,
            font: { size: 11 },
          },
        };
      }

      const fundingDsIndex = hasFunding ? 2 : -1;
      const bpsApprox = asset.etoro_overnight_fee_bps_approx;
      const showTitle =
        bpsApprox != null && !Number.isNaN(Number(bpsApprox));
      const chartTitleText = showTitle
        ? (asset.id || "") +
          " · ~" +
          Number(bpsApprox).toFixed(2) +
          " bps/day (illustrative)"
        : (asset.id || "") + " · spot vs perp";

      return new Chart(canvas, {
        type: "line",
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            title: {
              display: true,
              text: chartTitleText,
              color: TITLE_GREEN,
              font: { size: 12, weight: "600" },
              padding: { bottom: 6 },
            },
            legend: {
              labels: { color: LEGEND, font: { size: 11 } },
            },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const v = ctx.parsed.y;
                  if (fundingDsIndex >= 0 && ctx.datasetIndex === fundingDsIndex) {
                    return (
                      ctx.dataset.label +
                      ": " +
                      (v != null && !Number.isNaN(v) ? v.toFixed(4) + "%" : "—")
                    );
                  }
                  return (
                    ctx.dataset.label +
                    ": " +
                    (v != null && !Number.isNaN(v) ? Number(v).toFixed(4) : "—")
                  );
                },
              },
            },
          },
          scales,
        },
      });
    }

    const REFRESH_INTERVAL_MS = 10 * 60 * 1000;
    let activeCharts = [];
    let refreshDeadline = Date.now() + REFRESH_INTERVAL_MS;
    let countdownTimer = null;

    function destroyCharts() {
      activeCharts.forEach((c) => { try { c.destroy(); } catch (_) {} });
      activeCharts = [];
    }

    async function load() {
      const globalMeta = document.getElementById("globalMeta");
      const errBox = document.getElementById("err");
      const root = document.getElementById("chartsRoot");
      let data;
      let source = "live";

      try {
        globalMeta.textContent = "Fetching live data from Binance…";
        data = await fetchLiveData(globalMeta);
      } catch (liveErr) {
        source = "fallback";
        console.warn("Live Binance fetch failed, falling back to data.json:", liveErr);
        globalMeta.textContent = "Live fetch failed — loading cached data.json…";
        try {
          const res = await fetch("data.json", { cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          data = await res.json();
        } catch (e) {
          errBox.style.display = "block";
          errBox.textContent = "Live Binance failed (" + liveErr.message + ") and data.json also unavailable (" + e.message + ")";
          globalMeta.textContent = "Could not load data";
          return;
        }
      }

      const raw = normalizeAssets(data);
      const assets = orderAssets(raw);
      if (!assets.length) {
        errBox.style.display = "block";
        errBox.textContent = "No assets in data.json";
        globalMeta.textContent = "Empty dataset";
        return;
      }

      errBox.style.display = "none";

      const tf = data.timeframe || "";
      const wd =
        data.window_days != null ? data.window_days + "d" : "";
      const note = data.etoro_overnight_fee_bps_note || "";
      const srcLabel = source === "live"
        ? '<span style="color:#15803d;font-weight:600">LIVE from Binance</span>'
        : '<span style="color:#b45309;font-weight:600">cached data.json</span>';
      globalMeta.innerHTML =
        srcLabel + " · <code>" +
        tf +
        "</code>" +
        (wd ? " · " + wd + " window" : "") +
        " · generated <code>" +
        (data.generated_at || "?") +
        "</code>" +
        (note
          ? "<br><span style=\"font-size:0.8rem\">" + note + "</span>"
          : "");

      destroyCharts();
      root.innerHTML = "";

      assets.forEach((asset) => {
        const section = document.createElement("section");
        section.className = "asset-block";

        const h2 = document.createElement("h2");
        h2.textContent = asset.id || "—";
        section.appendChild(h2);

        const p = document.createElement("p");
        p.className = "asset-meta";
        p.textContent = assetMetaLines(data, asset);
        section.appendChild(p);

        const box = document.createElement("div");
        box.className = "chart-box";
        const canvas = document.createElement("canvas");
        box.appendChild(canvas);
        section.appendChild(box);

        const dirTable = buildDirectionTable(asset);
        if (dirTable) section.appendChild(dirTable);

        if (asset.per_direction && asset.per_direction.settlements && asset.per_direction.settlements.length) {
          const fundBox = document.createElement("div");
          fundBox.className = "funding-chart-box";
          const fundCanvas = document.createElement("canvas");
          fundBox.appendChild(fundCanvas);
          section.appendChild(fundBox);
          const fc = buildFundingPnlChart(fundCanvas, asset);
          if (fc) activeCharts.push(fc);
        }

        root.appendChild(section);
        activeCharts.push(buildChart(canvas, data, asset));
      });
    }

    function updateCountdown() {
      const remaining = Math.max(0, refreshDeadline - Date.now());
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      const pad = secs < 10 ? "0" : "";
      document.getElementById("refreshStatus").textContent =
        "Next refresh in " + mins + ":" + pad + secs;
    }

    function scheduleRefresh() {
      refreshDeadline = Date.now() + REFRESH_INTERVAL_MS;
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(updateCountdown, 1000);
      updateCountdown();
    }

    async function refreshNow() {
      document.getElementById("refreshStatus").textContent = "Refreshing…";
      await load();
      scheduleRefresh();
    }

    document.getElementById("refreshNow").addEventListener("click", refreshNow);

    setInterval(refreshNow, REFRESH_INTERVAL_MS);

    window.addEventListener("beforeunload", destroyCharts, { once: true });

    load().then(scheduleRefresh);
  </script>
</body>
</html>
