# Serves sol-perp/ at https://<user>.github.io/<repo>/
# Same pattern as hl-vs-etoro: CI builds data → _site → Pages artifact.
# First time: Repo → Settings → Pages → Build: GitHub Actions.

name: Deploy GitHub Pages

# Use Node 24 for JS actions (avoids Node 20 deprecation warnings / future hard failures).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh Binance OHLCV (~4×/day UTC). Remove this block for push-only updates.
    - cron: "35 6,12,18,0 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Tags v5/v4 still declare node20; these SHAs are post–Node 24 upgrade on main.
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      - name: Build static site (SOL chart + Binance data)
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install -e .
          set +e
          python scripts/build_sol_perp_chart_data.py
          fetch_ok=$?
          set -e
          if [ "$fetch_ok" -ne 0 ]; then
            echo "::warning title=Binance blocked in CI::GitHub-hosted runners often get HTTP 451 (restricted location) from Binance futures. Publishing with the last committed sol-perp/data.json. Regenerate locally and push, or run the SOL perpetual chart data workflow from a runner/network that can reach Binance."
          else
            echo "Fetched fresh OHLCV from Binance."
          fi
          python -c "import json; d=json.load(open('sol-perp/data.json')); assert d.get('generated_at'); assert d.get('series'); print('data ok', d['generated_at'], len(d['series']), 'rows')"
          mkdir -p _site
          cp sol-perp/index.html _site/
          cp sol-perp/data.json _site/
          echo "## Pages artifact" >> "$GITHUB_STEP_SUMMARY"
          ls -la _site >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**data.json bytes:** $(wc -c < _site/data.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "**generated_at prefix:** $(head -c 120 _site/data.json)" >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
