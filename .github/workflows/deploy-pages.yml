# Serves sol-perp/ at https://<user>.github.io/<repo>/
# Same pattern as hl-vs-etoro: CI builds data → _site → Pages artifact.
# First time: Repo → Settings → Pages → Build: GitHub Actions.

name: Deploy GitHub Pages

# Use Node 24 for JS actions (avoids Node 20 deprecation warnings / future hard failures).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh Binance OHLCV every 2 hours UTC. GitHub runners may get HTTP 451
    # from Binance (geo-blocked), so more frequent runs improve odds of a fresh hit.
    - cron: "35 */2 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Tags v5/v4 still declare node20; these SHAs are post–Node 24 upgrade on main.
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      - name: Build static site (SOL chart + Binance data)
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install -e .
          set +e
          python scripts/build_sol_perp_chart_data.py
          fetch_ok=$?
          set -e
          if [ "$fetch_ok" -ne 0 ]; then
            echo "::warning title=Binance blocked in CI::GitHub-hosted runners often get HTTP 451 (restricted location) from Binance futures. Publishing with the last committed sol-perp/data.json. Regenerate locally and push, or run the SOL perpetual chart data workflow from a runner/network that can reach Binance."
          else
            echo "Fetched fresh OHLCV from Binance."
          fi
          python -c "import json; d=json.load(open('sol-perp/data.json')); assets=d.get('assets'); assert d.get('generated_at'); assert assets and len(assets)>=1; s=assets[0].get('series') or []; r0=s[0]; assert s and r0.get('perp') is not None and r0.get('spot') is not None; print('data ok', d['generated_at'], len(assets), 'assets', len(s), 'rows first')"
          mkdir -p _site
          cp sol-perp/index.html _site/
          cp sol-perp/data.json _site/
          cp sol-perp/etoro-logo.svg _site/
      - name: Password-protect HTML
        env:
          REPORT_USER: ${{ secrets.REPORT_USER }}
          REPORT_PASS: ${{ secrets.REPORT_PASS }}
        run: |
          pip install cryptography
          python scripts/protect_html.py _site/index.html _site/index.html \
            -u "$REPORT_USER" -p "$REPORT_PASS" -t "SOL Perpetuals vs eToro"
          echo "## Pages artifact" >> "$GITHUB_STEP_SUMMARY"
          ls -la _site >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**data.json bytes:** $(wc -c < _site/data.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "**generated_at prefix:** $(head -c 120 _site/data.json)" >> "$GITHUB_STEP_SUMMARY"
      # Composite pins upload-artifact@… (node20) — may still log a deprecation until GitHub updates it.
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
