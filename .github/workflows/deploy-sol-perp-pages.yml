# Serves sol-perp/ at https://nicolassh-tr.github.io/perpetuals-trading-dep/
# Repo → Settings → Pages → Build: GitHub Actions (first time only).

name: Deploy SOL chart (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "sol-perp/**"
      - ".github/workflows/deploy-sol-perp-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-sol-perp
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: sol-perp
      - id: deployment
        uses: actions/deploy-pages@v4
