# Commit sol-perp/data.json to main (optional; live Pages uses CI build in deploy-pages.yml).
name: SOL perpetual chart data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .
      - name: Build data.json
        run: python scripts/build_sol_perp_chart_data.py
      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh sol-perp/data.json"
          file_pattern: sol-perp/data.json
